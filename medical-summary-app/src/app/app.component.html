<nav class="navbar" *ngIf="user">
  <div class="nav-brand">MedAssist 🩺</div> 
  
  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="active-link">Acasă</a>
    
    <a *ngIf="userRole === 'pacient' || userRole === 'medic' || userRole === 'admin'" routerLink="/summary" routerLinkActive="active-link">Sumarizare Fișe</a>
    <a *ngIf="userRole === 'pacient' || userRole === 'medic' || userRole === 'admin'" routerLink="/ehr" routerLinkActive="active-link">Istoric Fișe (EHR)</a>
    <a *ngIf="userRole === 'pacient' || userRole === 'medic' || userRole === 'admin'" routerLink="/chat" routerLinkActive="active-link">Chatbot Medical</a>
    
    <a *ngIf="userRole === 'medic'" routerLink="/doctor-dashboard" routerLinkActive="active-link">Pacienții Mei</a>
    
    <a *ngIf="userRole === 'admin'" routerLink="/admin" routerLinkActive="active-link">Panou Admin</a>
  </div>

  <div class="nav-user">
    <div class="user-info">
      <div style="display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px;">
        <span class="welcome-text">{{ user.displayName || user.email }}</span>
        <span style="font-size: 11px; color: #7f8c8d; text-transform: uppercase; font-weight: bold;">{{ userRole }}</span>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      Ieșire
    </button>
  </div>
</nav>

<router-outlet></router-outlet>
