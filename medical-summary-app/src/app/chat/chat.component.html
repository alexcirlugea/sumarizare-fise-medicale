<div class="container">
  <div class="chat-card">
    
    <div class="chat-header">
      <h2>Asistent Medical Virtual</h2>
      
      <div class="filter-controls">
        <div class="control-group">
          <label for="scopeSelect">Domeniu:</label>
          <select id="scopeSelect" [(ngModel)]="scope" (change)="onScopeChange()" class="select-control">
            <option value="global">🌐 Toate datele</option>
            <option value="patient" *ngIf="userRole !== 'pacient'">👤 Pacient specific</option>
          </select>
        </div>

        <div class="control-group" *ngIf="scope === 'patient' && userRole !== 'pacient'">
          <label for="patientSelect">Pacient:</label>
          <select id="patientSelect" [(ngModel)]="selectedPatientId" class="select-control">
            <option [ngValue]="null">-- Alege un pacient --</option>
            <option *ngFor="let p of myPatients" [ngValue]="p.id">
              {{ p.full_name }}
            </option>
          </select>
        </div>
      </div>
    </div>

    <div class="context-bar" *ngIf="selectedIds.length > 0">
      <span class="context-info">
        📎 Context selectiv: <strong>{{ selectedIds.length }}</strong> {{ selectedIds.length === 1 ? 'fișă selectată' : 'fișe selectate' }}
      </span>
      <button class="btn-clear-context" (click)="clearContext()" title="Golește contextul selectat">
        🗑️ Golește
      </button>
    </div>
    
    <div class="chat-window">
      <div *ngFor="let msg of messages" [ngClass]="{'message-user': msg.sender === 'user', 'message-bot': msg.sender === 'bot'}">
        <div class="bubble">
          {{ msg.text }}
        </div>
      </div>
      <div *ngIf="isLoading" class="message-bot">
        <div class="bubble typing">Asistentul analizează datele clinice...</div>
      </div>
    </div>

    <div class="input-area">
      <input 
        type="text" 
        [(ngModel)]="userMessage" 
        (keyup.enter)="sendMessage()" 
        placeholder="Pune o întrebare clinică sau statistică..." 
        [disabled]="isLoading"
      />
      <button class="btn-primary" (click)="sendMessage()" [disabled]="!userMessage.trim() || isLoading">
        Trimite
      </button>
    </div>
  </div>
</div>
